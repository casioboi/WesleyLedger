<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var k = 'wesleyLedger.theme.v1'
          var t = localStorage.getItem(k)
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t)
            document.documentElement.style.colorScheme = t === 'light' ? 'light' : 'dark'
          } else {
            document.documentElement.setAttribute('data-theme', 'dark')
            document.documentElement.style.colorScheme = 'dark'
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1628" />
    <meta name="description" content="WesleyLedger — Financial Stewardship for Methodist Church Ghana societies." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <title>WesleyLedger</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
